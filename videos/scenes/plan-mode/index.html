<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280, height=720" />
<title>Switchboard — Plan mode</title>
<link rel="stylesheet" href="../_shared/theme.css" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  .stage { width: 100%; height: 100%; padding: 60px 80px; display: flex; flex-direction: column; gap: 16px; }

  /* Mode picker */
  .mode-row { display: flex; gap: 10px; align-items: center; position: relative; }
  .mode-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; }
  .mode-chip {
    padding: 5px 11px; border-radius: 999px;
    font-size: 12px; font-weight: 500;
    border: 1px solid var(--border-strong);
    color: var(--text-secondary);
    background: var(--bg-secondary);
    transition: all 200ms ease;
  }
  .mode-chip.active {
    background: rgba(255, 180, 70, 0.15);
    border-color: rgba(255, 180, 70, 0.5);
    color: var(--warn);
  }

  /* Chat surface */
  .chat {
    flex: 1; background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px; display: flex; flex-direction: column; gap: 14px;
    overflow: hidden;
  }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: var(--bg-tertiary); }
  .msg.assistant { align-self: flex-start; color: var(--text-secondary); }

  .tool-call {
    align-self: flex-start; max-width: 75%;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; font-family: var(--font-mono); font-size: 12.5px;
    background: var(--bg-tertiary); color: var(--text-secondary);
    display: flex; align-items: center; gap: 10px;
  }
  .tool-call .icon { color: var(--accent); }

  .denial-pill {
    align-self: flex-start; max-width: 75%;
    border-left: 3px solid var(--danger);
    background: rgba(255, 138, 138, 0.08);
    padding: 8px 14px; border-radius: 4px; font-size: 12.5px;
    color: var(--danger);
  }
  .denial-pill code {
    font-family: var(--font-mono);
    background: rgba(255, 138, 138, 0.15);
    padding: 1px 5px; border-radius: 3px;
  }

  .reveal { opacity: 0; transform: translateY(6px); transition: opacity 350ms ease, transform 350ms ease; }
  .reveal.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div id="root" data-composition-id="plan-mode" data-start="0" data-duration="10" data-width="1280" data-height="720">
<div class="stage">
  <div class="mode-row">
    <span class="mode-label">Runtime mode</span>
    <span id="m-sandbox" class="mode-chip">Sandbox</span>
    <span id="m-plan" class="mode-chip">Plan</span>
    <span id="m-edits" class="mode-chip">Accept edits</span>
    <span id="m-full" class="mode-chip">Full access</span>
  </div>

  <div class="chat">
    <div id="m1" class="msg user reveal">refactor the auth flow</div>
    <div id="m2" class="msg assistant reveal">I'll start by reading the existing auth code.</div>
    <div id="m3" class="tool-call reveal"><span class="icon">⚙</span>Read · src/auth/login.ts</div>
    <div id="m4" class="tool-call reveal"><span class="icon">⚙</span>Read · src/auth/session.ts</div>
    <div id="m5" class="tool-call reveal"><span class="icon">⚙</span>Write · src/auth/login.ts</div>
    <div id="m6" class="denial-pill reveal">🚫 Plan mode blocked <code>Write</code> — switch to Sandbox to execute.</div>
  </div>
</div>
</div>
<script>
  const els = ['m1','m2','m3','m4','m5','m6'].map((id) => document.getElementById(id))
  const planChip = document.getElementById('m-plan')
  function renderAt(t) {
    // 0.7s — Plan-mode chip activates (gives the eye time to read all 4 chips first)
    planChip.classList.toggle('active', t >= 0.7)
    // Messages staggered ~1.1s apart so each is readable before the next lands.
    // Final denial pill sticks for ~3.5s — that's the punchline frame.
    const stamps = [1.5, 2.5, 3.5, 4.5, 5.5, 6.5]
    els.forEach((e, i) => e.classList.toggle('show', t >= stamps[i]))
  }
  window.__timelines = window.__timelines || {};
  const __proxy = { t: 0 };
  const tl = gsap.timeline({ paused: true });
  tl.to(__proxy, { t: 10, duration: 10, ease: 'none', onUpdate: () => renderAt(__proxy.t) }, 0);
  window.__timelines["plan-mode"] = tl;
  setTimeout(() => { if (tl.time() === 0 && !tl.isActive()) tl.play(); }, 50);
</script>
</body>
</html>
