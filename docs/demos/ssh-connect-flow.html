<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Switchboard - Connect to Remote (UX demo)</title>
<style>
  :root{
    --bg:#0c0d10; --panel:#141519; --panel2:#1a1c22; --border:#26282f;
    --text:#e6e8ec; --muted:#8b909a; --accent:#3b82f6; --accent-sub:rgba(59,130,246,.15);
    --green:#3fb950; --amber:#d29922; --red:#f85149; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#000;color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px;gap:16px}
  .stage{width:920px;max-width:96vw}
  /* fake app window */
  .win{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,.6);height:540px;display:flex;flex-direction:column}
  .titlebar{height:36px;display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--panel);
    border-bottom:1px solid var(--border)}
  .dots{display:flex;gap:6px}.dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .title{font-size:12px;color:var(--muted);flex:1;text-align:center}
  .hostbadge{font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:20px;border:1px solid var(--border);
    color:var(--muted);display:flex;align-items:center;gap:6px;background:var(--panel2)}
  .hostbadge .pip{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .hostbadge.remote{color:#cfe3ff;border-color:rgba(59,130,246,.5);background:var(--accent-sub)}
  .hostbadge.remote .pip{background:var(--green);box-shadow:0 0 7px var(--green)}
  .body{flex:1;display:flex;min-height:0}
  .sidebar{width:200px;border-right:1px solid var(--border);background:var(--panel);padding:10px;display:flex;flex-direction:column;gap:4px}
  .sb-h{font-size:10px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:10px 4px 4px}
  .sb-item{font-size:13px;padding:6px 8px;border-radius:6px;color:var(--text);display:flex;align-items:center;gap:7px;cursor:default}
  .sb-item.active{background:var(--accent-sub);color:#cfe3ff}
  .sb-item .fav{width:8px;height:8px;border-radius:2px;background:#5a6;}
  .connect-btn{margin-top:6px;font-size:12px;padding:7px 8px;border-radius:6px;border:1px dashed var(--border);
    color:var(--muted);background:transparent;cursor:pointer;text-align:left;transition:.15s}
  .connect-btn:hover,.connect-btn.pulse{border-color:var(--accent);color:#cfe3ff;background:var(--accent-sub)}
  .connect-btn.pulse{animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 4px rgba(59,130,246,0)}}
  .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
  .pane-h{height:28px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;
    font-size:11px;color:var(--muted);font-family:var(--mono);gap:8px;background:var(--panel2)}
  .term{flex:1;background:#0a0b0e;padding:14px;font-family:var(--mono);font-size:12.5px;color:#cdd3da;overflow:hidden}
  .term .p{color:var(--green)}.term .rp{color:#7aa2f7}.term .o{color:var(--muted)}.term .c{color:#e6e8ec}
  .statusbar{height:24px;border-top:1px solid var(--border);background:var(--panel);display:flex;align-items:center;
    gap:14px;padding:0 12px;font-size:11px;color:var(--muted);font-family:var(--mono)}
  /* overlay (modal / connecting) */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding-top:64px}
  .modal{width:440px;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.55)}
  .modal .search{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)}
  .modal .search b{color:var(--text);font-weight:500}
  .row{padding:9px 14px;display:flex;align-items:center;gap:10px;cursor:default;border-left:2px solid transparent}
  .row.sel{background:var(--accent-sub);border-left-color:var(--accent)}
  .row .name{font-size:13px;color:var(--text)}
  .row .addr{font-size:11px;color:var(--muted);font-family:var(--mono);margin-left:auto}
  .row .ic{width:16px;text-align:center;color:var(--muted)}
  .modal .foot{padding:7px 14px;border-top:1px solid var(--border);font-size:10.5px;color:var(--muted);display:flex;justify-content:space-between}
  /* connecting checklist */
  .checklist{padding:18px 18px 8px}
  .checklist .ttl{font-size:14px;margin-bottom:14px;color:var(--text)}
  .step{display:flex;gap:10px;align-items:center;padding:5px 0;font-size:13px;color:var(--muted)}
  .step .mk{width:16px;text-align:center}
  .step.done{color:var(--text)}.step.done .mk{color:var(--green)}
  .step.run{color:#cfe3ff}.step.run .mk{color:var(--accent)}
  .spin{display:inline-block;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  .banner{position:absolute;top:28px;left:0;right:0;padding:7px 14px;font-size:12px;display:flex;align-items:center;gap:8px;z-index:5}
  .banner.warn{background:rgba(210,153,34,.16);color:#f0c674;border-bottom:1px solid rgba(210,153,34,.4)}
  .banner.ok{background:rgba(63,185,80,.14);color:#8ee59a;border-bottom:1px solid rgba(63,185,80,.4)}
  .callout{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--accent);
    border-radius:8px;padding:14px 16px;font-size:13px;color:var(--text);width:920px;max-width:96vw}
  .callout b{color:#cfe3ff}.callout .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:5px}
  .nav{display:flex;align-items:center;gap:12px}
  .nav button{font-size:13px;padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:var(--panel);
    color:var(--text);cursor:pointer}
  .nav button:hover{border-color:var(--accent)}
  .nav button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .nav button:disabled{opacity:.4;cursor:default}
  .pips{display:flex;gap:6px;margin:0 6px}
  .np{width:8px;height:8px;border-radius:50%;background:var(--border)}.np.on{background:var(--accent)}
  .tag{font-size:10px;color:var(--muted)}
</style>
</head>
<body>
  <div class="stage">
    <div class="win">
      <div class="titlebar">
        <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
        <div class="title">Switchboard - ~/api</div>
        <div id="badge" class="hostbadge"><span class="pip"></span><span id="badgeText">Local</span></div>
      </div>
      <div class="body">
        <div class="sidebar">
          <div class="sb-h">Project</div>
          <div class="sb-item active"><span class="fav"></span> api</div>
          <div class="sb-item"><span class="fav" style="background:#a6f"></span> infra</div>
          <div class="sb-h">Remote</div>
          <div id="remoteList"></div>
          <button id="connectBtn" class="connect-btn pulse">+ Connect to remote…</button>
        </div>
        <div class="main" id="main"><!-- filled per step --></div>
      </div>
    </div>

    <div class="callout">
      <span class="k" id="calloutK">Step</span>
      <div id="calloutText"></div>
    </div>

    <div class="nav">
      <button id="prev">‹ Back</button>
      <div class="pips" id="pips"></div>
      <button id="next" class="primary">Next ›</button>
      <span class="tag">clickable mockup · not the real app</span>
    </div>
  </div>

<script>
const REMOTE = "prod-vm";
const ADDR = "ubuntu@10.0.4.12";

const steps = [
  {
    badge:["Local",false],
    k:"1 · Entry point",
    text:"You're working locally. A <b>Remote</b> section in the sidebar lists SSH hosts; click <b>+ Connect to remote…</b> to attach the whole workspace to another machine.",
    connectPulse:true,
    main:`<div class="pane-h">▸ zsh - local</div>
      <div class="term"><span class="p">~/api $</span> <span class="c">npm run dev</span><br><span class="o"># …runs on your laptop</span></div>
      <div class="statusbar"><span>● api</span><span>local</span><span>1 terminal</span></div>`
  },
  {
    badge:["Local",false],
    k:"2 · Pick a host",
    text:"Hosts come straight from your <b>~/.ssh/config</b> and <b>known_hosts</b> - no manual entry. Pick one (here, <b>prod-vm</b>). Auth uses your existing SSH keys via the system <code>ssh</code> binary.",
    main:({sel})=>`<div class="pane-h">▸ zsh - local</div>
      <div class="term"><span class="p">~/api $</span> <span class="o">_</span></div>
      <div class="statusbar"><span>● api</span><span>local</span></div>
      <div class="overlay"><div class="modal">
        <div class="search">Connect to Remote &nbsp; <b>prod</b>▏</div>
        ${hostRow("🖥","prod-vm","ubuntu@10.0.4.12",true)}
        ${hostRow("🖥","staging","deploy@staging.acme.dev",false)}
        ${hostRow("🖥","gpu-box","tejas@192.168.1.50",false)}
        ${hostRow("＋","Add a host…","",false)}
        <div class="foot"><span>↑↓ select · ⏎ connect · esc cancel</span><span>from ~/.ssh/config</span></div>
      </div></div>`
  },
  {
    badge:["connecting…",false],
    k:"3 · Connecting (under the hood)",
    text:"Switchboard SSHes in, <b>spawns a small server on the remote</b>, and forwards a local port to it - exactly how VS Code Remote works. No SFTP, no second SSH client. The server is installed once, then reused.",
    main:()=>`<div class="pane-h">prod-vm</div>
      <div class="checklist">
        <div class="ttl">Connecting to <b>prod-vm</b> <span class="o">(${ADDR})</span></div>
        <div class="step done"><span class="mk">✓</span> Resolved host from ~/.ssh/config</div>
        <div class="step done"><span class="mk">✓</span> Opened SSH connection (key auth)</div>
        <div class="step run"><span class="mk spin">◐</span> Starting Switchboard server on remote… <span class="o">(first time: installs)</span></div>
        <div class="step"><span class="mk">◦</span> Forwarding 127.0.0.1:7681 → remote</div>
        <div class="step"><span class="mk">◦</span> Pairing (token over the SSH channel)</div>
      </div>
      <div class="statusbar"><span>● api</span><span>connecting to prod-vm…</span></div>`
  },
  {
    badge:[REMOTE,true],
    k:"4 · Connected - the whole workspace is remote",
    text:"Same UI, <b>remote backend</b>. This terminal, the file tree, and your agent chats now run <b>on prod-vm</b> - your laptop is just the screen. Open files are prod-vm's files; <code>npm</code>, git, and Claude/Codex run there.",
    main:()=>`<div class="pane-h">▸ bash - <span style="color:#7aa2f7">prod-vm</span></div>
      <div class="term">
        <span class="rp">ubuntu@prod-vm:~/api$</span> <span class="c">hostname && nvidia-smi -L</span><br>
        <span class="o">prod-vm</span><br>
        <span class="o">GPU 0: NVIDIA A100-SXM4-40GB</span><br>
        <span class="rp">ubuntu@prod-vm:~/api$</span> <span class="o">_</span>
      </div>
      <div class="statusbar"><span style="color:#8ee59a">● connected</span><span>${ADDR}</span><span>14 ms</span><span>files: prod-vm</span></div>`
  },
  {
    badge:[REMOTE,true],
    k:"5 · Survives a network blip",
    text:"If the link drops, the <b>remote server keeps your sessions alive</b>. Switchboard re-opens the SSH tunnel and reattaches - your terminals and agent runs are right where you left them.",
    main:()=>`<div class="banner warn"><span class="spin">◐</span> Connection dropped - reconnecting to prod-vm…</div>
      <div class="pane-h">▸ bash - <span style="color:#7aa2f7">prod-vm</span></div>
      <div class="term"><span class="rp">ubuntu@prod-vm:~/api$</span> <span class="o">long-running-train.py … (still running on remote)</span></div>
      <div class="statusbar"><span style="color:#f0c674">● reconnecting</span><span>${ADDR}</span></div>`
  }
];

function hostRow(ic,name,addr,sel){
  return `<div class="row ${sel?'sel':''}"><span class="ic">${ic}</span><span class="name">${name}</span>${addr?`<span class="addr">${addr}</span>`:''}</div>`;
}

let i=0;
const main=document.getElementById('main'), badge=document.getElementById('badge'),
  badgeText=document.getElementById('badgeText'), connectBtn=document.getElementById('connectBtn'),
  calloutK=document.getElementById('calloutK'), calloutText=document.getElementById('calloutText'),
  prev=document.getElementById('prev'), next=document.getElementById('next'), pips=document.getElementById('pips');

// remote list in sidebar (shows once "connected")
function renderRemoteList(connected){
  document.getElementById('remoteList').innerHTML = connected
    ? `<div class="sb-item active"><span class="fav" style="background:#3fb950;border-radius:50%"></span> ${REMOTE}</div>`
    : `<div class="sb-item" style="opacity:.5"><span class="fav" style="background:#555;border-radius:50%"></span> ${REMOTE} <span style="margin-left:auto;font-size:10px">offline</span></div>`;
}

function render(){
  const s=steps[i];
  const [bt,remote]=s.badge;
  badgeText.textContent = remote? `${bt}` : bt;
  badge.className = "hostbadge"+(remote?" remote":"");
  calloutK.textContent=s.k;
  calloutText.innerHTML=s.text;
  connectBtn.classList.toggle('pulse', !!s.connectPulse && i===0);
  renderRemoteList(i>=3);
  const m = typeof s.main==='function'? s.main({sel:0}) : s.main;
  main.innerHTML=m;
  pips.innerHTML=steps.map((_,j)=>`<span class="np ${j===i?'on':''}"></span>`).join('');
  prev.disabled=i===0; next.disabled=i===steps.length-1;
}
prev.onclick=()=>{if(i>0){i--;render()}};
next.onclick=()=>{if(i<steps.length-1){i++;render()}};
connectBtn.onclick=()=>{if(i===0){i=1;render()}};
document.querySelector('.main').addEventListener('click',e=>{ if(e.target.closest('.row.sel') && i===1){i=2;render(); setTimeout(()=>{if(i===2){i=3;render()}},1400)} });
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next.onclick();if(e.key==='ArrowLeft')prev.onclick()});
render();
</script>
</body>
</html>
