<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0A0A0A"/>
  
  <!-- 
    Minimal hub-and-spoke: one central node, five outer nodes
    arranged asymmetrically for visual tension (not a perfect circle).
    Lines are thin, nodes are clean circles. 
    The slight asymmetry makes it feel designed, not generated.
  -->
  
  <!-- Spokes — thin, crisp lines -->
  <line x1="256" y1="256" x2="172" y2="142" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="356" y2="136" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="128" y2="296" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="378" y2="312" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="224" y2="388" stroke="#E5E5E5" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Cross-connections between outer nodes (the "switchboard" routing) -->
  <line x1="172" y1="142" x2="356" y2="136" stroke="#E5E5E5" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <line x1="128" y1="296" x2="224" y2="388" stroke="#E5E5E5" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <line x1="356" y1="136" x2="378" y2="312" stroke="#E5E5E5" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Outer nodes — hollow circles -->
  <circle cx="172" cy="142" r="14" fill="#0A0A0A" stroke="#E5E5E5" stroke-width="2.5"/>
  <circle cx="356" cy="136" r="14" fill="#0A0A0A" stroke="#E5E5E5" stroke-width="2.5"/>
  <circle cx="128" cy="296" r="14" fill="#0A0A0A" stroke="#E5E5E5" stroke-width="2.5"/>
  <circle cx="378" cy="312" r="14" fill="#0A0A0A" stroke="#E5E5E5" stroke-width="2.5"/>
  <circle cx="224" cy="388" r="14" fill="#0A0A0A" stroke="#E5E5E5" stroke-width="2.5"/>
  
  <!-- Center hub — solid, larger, the anchor point -->
  <circle cx="256" cy="256" r="20" fill="#E5E5E5"/>
</svg>
